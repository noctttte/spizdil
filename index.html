<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOCTERA STORE</title>

<style>
/* БАЗА */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  overflow-x: hidden;
}

/* АНИМИРОВАННЫЙ ФОН */
body::before {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(0, 200, 255, 0.15), transparent 70%);
  top: 20%;
  left: 15%;
  animation: move1 30s infinite alternate ease-in-out;
  filter: blur(80px);
  z-index: -1;
}

body::after {
  content: "";
  position: fixed;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(255, 0, 150, 0.15), transparent 70%);
  bottom: 20%;
  right: 15%;
  animation: move2 35s infinite alternate ease-in-out;
  filter: blur(80px);
  z-index: -1;
}

/* ДВИЖЕНИЕ */
@keyframes move1 {
  0% { transform: translate(0, 0); }
  100% { transform: translate(200px, 150px); }
}

@keyframes move2 {
  0% { transform: translate(0, 0); }
  100% { transform: translate(-200px, -150px); }
}

/* КОНТЕЙНЕР (первый экран) */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* НАЗВАНИЕ */
.title {
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 6px;
  text-align: center;
}

/* КНОПКА ENTER */
.enter-btn {
  display: inline-block;
  margin-top: 30px;
  padding: 12px 30px;
  border: 1px solid white;
  color: white;
  text-decoration: none;
  letter-spacing: 2px;
  transition: 0.3s;
}

.enter-btn:hover {
  background: white;
  color: black;
}

/* СЕКЦИЯ МАГАЗИНА */
.shop {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ПРОДУКТ */
.product {
  display: flex;
  align-items: center;
  gap: 60px;
}

/* КАРТИНКА */
.product-img {
  width: 350px;
}

/* ТЕКСТ */
.product-info {
  max-width: 300px;
}

.price {
  margin: 10px 0;
  font-size: 20px;
}

.desc {
  color: #888;
  margin-bottom: 20px;
}

/* КНОПКА BUY */
.btn {
  padding: 12px 25px;
  border: 1px solid white;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.btn:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<!-- ПЕРВЫЙ ЭКРАН -->
<div class="container">
  <div class="title">NOCTERA STORE</div>
  <a href="#shop" class="enter-btn">ENTER STORE</a>
</div>

<!-- СЕКЦИЯ С ТОВАРОМ -->
<section id="shop" class="shop">

  <div class="product">

    <img src="black.jpg" class="product-img">

    <div class="product-info">
      <h2>Black Hoodie</h2>
      <p class="price">$49</p>

      <p class="desc">
        Minimal hoodie. Clean design. Premium quality.
      </p>

      <a href="#" class="btn">BUY NOW</a>
    </div>

  </div>

</section>

</body>
</html>
