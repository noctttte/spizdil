<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOCTERA STORE</title>

<style>
/* БАЗА */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  overflow-x: hidden;
}

/* АНИМИРОВАННЫЙ ФОН */
body::before {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(0, 200, 255, 0.15), transparent 70%);
  top: 20%;
  left: 15%;
  animation: move1 30s infinite alternate ease-in-out;
  filter: blur(80px);
  z-index: -1;
  pointer-events: none; /* ВОТ ЭТО ДОБАВЬ */
}

body::after {
  content: "";
  position: fixed;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(255, 0, 150, 0.15), transparent 70%);
  bottom: 20%;
  right: 15%;
  animation: move2 35s infinite alternate ease-in-out;
  filter: blur(80px);
  z-index: -1;
  pointer-events: none; /* И СЮДА */
}
/* ДВИЖЕНИЕ */
@keyframes move1 {
  0% { transform: translate(0, 0); }
  100% { transform: translate(200px, 150px); }
}

@keyframes move2 {
  0% { transform: translate(0, 0); }
  100% { transform: translate(-200px, -150px); }
}


  /* ЦВЕТА */
.colors {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.colors span {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  cursor: pointer;
  display: inline-block;
  transition: 0.2s;
}

.colors span:hover {
  transform: scale(1.2);
}
/* КОНТЕЙНЕР (первый экран) */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* НАЗВАНИЕ */
.title {
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 6px;
  text-align: center;
}

/* КНОПКА ENTER */
.enter-btn {
  display: inline-block;
  margin-top: 30px;
  padding: 12px 30px;
  border: 1px solid white;
  color: white;
  text-decoration: none;
  letter-spacing: 2px;
  transition: 0.3s;
}

.enter-btn:hover {
  background: white;
  color: black;
}

/* СЕКЦИЯ МАГАЗИНА */
.shop {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ПРОДУКТ */
.product {
  display: flex;
  align-items: center;
  gap: 60px;
}

/* КАРТИНКА */
.product-img {
  width: 350px;
}

/* ТЕКСТ */
.product-info {
  max-width: 300px;
}

.price {
  margin: 10px 0;
  font-size: 20px;
}

.desc {
  color: #888;
  margin-bottom: 20px;
}

/* КНОПКА BUY */
.btn {
  padding: 12px 25px;
  border: 1px solid white;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

  /* РАЗМЕРЫ */
.sizes {
  display: flex;
  gap: 10px;
  margin: 10px 0;
}

.sizes span {
  padding: 6px 10px;
  border: 1px solid #555;
  cursor: pointer;
  font-size: 12px;
  transition: 0.2s;
}

  /* СЕТКА 2 ТОВАРА */
.products-grid {
  display: flex;
  justify-content: center;
  gap: 80px;
}

/* ЧУТЬ СДВИГАЕМ ВЛЕВО */
.shop {
  padding-left: 40px;
}

/* ЧТОБЫ НЕ ЛОМАЛОСЬ НА МОБИЛЕ */
@media (max-width: 900px) {
  .products-grid {
    flex-direction: column;
    align-items: center;
  }
}
  
.sizes span:hover {
  border: 1px solid white;
}

.btn:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<!-- ПЕРВЫЙ ЭКРАН -->
<div class="container">
  <div class="title">NOCTERA STORE</div>
  <a href="#shop" class="enter-btn">ENTER STORE</a>
</div>

<!-- СЕКЦИЯ С ТОВАРОМ -->
<section id="shop" class="shop">

  <div class="products-grid">

    <!-- ТОВАР 1 -->
    <div class="product">

      <img id="img1" src="pink.jpg" class="product-img">

      <div class="product-info">

        <div class="colors">
          <span onclick="changeColor(1, 'black')" style="background:#000"></span>
          <span onclick="changeColor(1, 'white')" style="background:#fff; border:1px solid #ccc"></span>
          <span onclick="changeColor(1, 'pink')" style="background:#ff4da6"></span>
        </div>

        <h2>Хуйланище</h2>
        <p class="price">67$</p>

        <div class="sizes">
          <span>S</span>
          <span>M</span>
          <span>L</span>
          <span>XL</span>
        </div>

        <a href="#" class="btn">BUY NOW</a>

      </div>
    </div>

    <!-- ТОВАР 2 -->
    <div class="product">

      <img id="img2" src="black.jpg" class="product-img">

      <div class="product-info">

        <div class="colors">
          <span onclick="changeColor(2, 'black')" style="background:#000"></span>
          <span onclick="changeColor(2, 'white')" style="background:#fff; border:1px solid #ccc"></span>
          <span onclick="changeColor(2, 'pink')" style="background:#ff4da6"></span>
        </div>

        <h2>Костюм</h2>
        <p class="price">990грн</p>

        <div class="sizes">
          <span>S</span>
          <span>M</span>
          <span>L</span>
          <span>XL</span>
        </div>

        <a href="#" class="btn">Придбати</a>

      </div>
    </div>

  </div>

</section>

<script>
function changeColor(color) {
  const img = document.getElementById("main-img");

  if (color === "black") img.src = "black.jpg";
  if (color === "white") img.src = "white.jpg";
  if (color === "pink") img.src = "pink.jpg";
}
</script>
  
</body>
</html>
