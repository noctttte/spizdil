<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOCTERA STORE</title>

<style>
/* БАЗА */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  overflow: hidden;
}

/* АНИМИРОВАННЫЙ ФОН */
body::before {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(0, 200, 255, 0.15), transparent 70%);
  top: 20%;
  left: 15%;
  animation: move1 30s infinite alternate ease-in-out;
  filter: blur(80px);
  z-index: -1;
}

body::after {
  content: "";
  position: fixed;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(255, 0, 150, 0.15), transparent 70%);
  bottom: 20%;
  right: 15%;
  animation: move2 35s infinite alternate ease-in-out;
  filter: blur(80px);
  z-index: -1;
}

/* ДВИЖЕНИЕ */
@keyframes move1 {
  0% { transform: translate(0, 0); }
  100% { transform: translate(200px, 150px); }
}

@keyframes move2 {
  0% { transform: translate(0, 0); }
  100% { transform: translate(-200px, -150px); }
}

/* НАЗВАНИЕ */
.title {
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 6px;
  text-align: center;
}

  /* КОНТЕЙНЕР */
.container {
  text-align: center;
  z-index: 1;
}

/* КНОПКА */
.enter-btn {
  display: inline-block;
  margin-top: 30px;
  padding: 12px 30px;
  border: 1px solid white;
  color: white;
  text-decoration: none;
  letter-spacing: 2px;
  transition: 0.3s;
}

/* ХОВЕР */
.enter-btn:hover {
  background: white;
  color: black;
}
  
</style>
</head>

<body>

<div class="container">
  <div class="title">NOCTERA STORE</div>

  <a href="#shop" class="enter-btn">ENTER STORE</a>
</div>

</body>
</html>
