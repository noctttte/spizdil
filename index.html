<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOCTERA STORE</title>

<style>
/* БАЗА */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  overflow-x: hidden;
}

/* АНИМИРОВАННЫЙ ФОН */
body::before {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(0, 200, 255, 0.15), transparent 70%);
  top: 10%;
  left: 10%;
  animation: move1 35s infinite alternate ease-in-out;
  z-index: -1;
  filter: blur(60px);
}

body::after {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(255, 0, 150, 0.15), transparent 70%);
  bottom: 10%;
  right: 10%;
  animation: move2 40s infinite alternate ease-in-out;
  z-index: -1;
  filter: blur(60px);
}

/* ДВИЖЕНИЕ */
@keyframes move1 {
  0% { transform: translate(0, 0); }
  100% { transform: translate(150px, 100px); }
}

@keyframes move2 {
  0% { transform: translate(0, 0); }
  100% { transform: translate(-150px, -120px); }
}

/* ЧТОБЫ КОНТЕНТ БЫЛ ПОВЕРХ */
header, .hero, .products, footer {
  position: relative;
  z-index: 1;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 40px 20px;
}

.hero img {
  width: 300px;
}

/* КНОПКИ */
.btn {
  margin-top: 20px;
  display: inline-block;
  padding: 12px 25px;
  background: white;
  color: black;
  text-decoration: none;
  font-weight: bold;
  border-radius: 5px;
}

/* ТОВАРЫ */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  text-align: center;
  border-radius: 10px;
}

.card img {
  width: 100%;
}

.price {
  margin: 10px 0;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: gray;
}
</style>
</head>

<body>

<header>NOCTERA STORE</header>

<section class="hero">
  <img src="size.jpg" alt="">
  <br>
  <a href="#products" class="btn">SHOP NOW</a>
</section>

<section id="products" class="products">

  <div class="card">
    <img src="black.jpg">
    <h3>Black Hoodie</h3>
    <div class="price">990UAH</div>
    <a class="btn">Buy</a>
  </div>

  <div class="card">
    <img src="white.jpg">
    <h3>White Hoodie</h3>
    <div class="price">990UAH</div>
    <a class="btn">Buy</a>
  </div>

  <div class="card">
    <img src="pink.jpg">
    <h3>Pink Hoodie</h3>
    <div class="price">990UAH</div>
    <a class="btn">Buy</a>
  </div>

</section>

<footer>
© 2026 NOCTERA STORE
</footer>

</body>
</html>
